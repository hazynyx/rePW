<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PW Enhancer Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <img src="icon48.png" width="20" height="20" alt="Logo">
                <h1>PW ki Gaand</h1>
            </div>
            <p class="subtitle">Here to Fuck ur mum ;) </p>
        </header>

        <!-- Main Panel (Stats + Button) -->
        <div class="panel">
            <div class="study-time-widget">
                <div class="study-time-label">Today's Study Time</div>
                <div id="study-time-display">00h 00m</div>
            </div>

            <button id="open-analysis-btn" class="primary-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
                Detailed Analysis
            </button>
        </div>

        <!-- Settings Panel -->
        <div class="panel settings-list">
            <!-- TrueTime Toggle -->
            <div class="setting-row">
                <div class="setting-info">
                    <h3 class="setting-title">Show TrueTime UI</h3>
                    <p class="setting-desc">Show exact time remaining based on playback speed.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="show-truetime" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Dark Mode Toggle -->
            <div class="setting-row">
                <div class="setting-info">
                    <h3 class="setting-title">Dark Mode</h3>
                    <p class="setting-desc">Enable smart dark mode for the entire site.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="dark-mode">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Custom Speed Dropdown -->
            <div class="setting-row">
                <div class="setting-info">
                    <h3 class="setting-title">Custom Speed</h3>
                    <p class="setting-desc">Override native limits.</p>
                </div>
                <select id="speed-dropdown" class="pw-dropdown">
                    <option value="1.0">1.00x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.50x</option>
                    <option value="1.75">1.75x</option>
                    <option value="2.0">2.00x</option>
                    <option value="2.25">2.25x</option>
                    <option value="2.5">2.50x</option>
                    <option value="3.0">3.00x</option>
                    <option value="4.0">4.00x</option>
                </select>
            </div>


        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
